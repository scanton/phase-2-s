name: review-basic-diff-coverage
skill: review
inputs:
  scope: |
    Review this diff that adds a new utility function without any tests:

    diff --git a/src/utils/format.ts b/src/utils/format.ts
    index abc1234..def5678 100644
    --- a/src/utils/format.ts
    +++ b/src/utils/format.ts
    @@ -0,0 +1,15 @@
    +/**
    + * Formats a duration in milliseconds to a human-readable string.
    + * Example: 1500 → "1.5s", 750 → "750ms"
    + */
    +export function formatDuration(ms: number): string {
    +  if (ms >= 1000) {
    +    return `${(ms / 1000).toFixed(1)}s`;
    +  }
    +  return `${ms}ms`;
    +}
acceptance_criteria:
  - text: Review output contains CRIT, WARN, or NIT severity tags
    type: structural
    match: "CRIT:|WARN:|NIT:"
  - text: Identifies missing test coverage for the new function
    type: quality
  - text: Provides actionable feedback that can be acted on immediately
    type: quality
timeout_ms: 60000
