name: satori-typescript-function
skill: satori
timeout_ms: 120000
fixture:
  type: node-project
  files:
    - path: package.json
      content: |
        {"name":"eval-fixture","version":"1.0.0","scripts":{"test":"echo 'test passed'"}}
    - path: src/add.ts
      content: |
        // TODO: implement add(a: number, b: number): number
inputs:
  task: "Implement the add() function in src/add.ts so it returns a+b."
  eval_command: "npm test"
verify_files:
  - src/add.ts
acceptance_criteria:
  - text: "Output mentions the file was modified or created"
    type: structural
    match: "add\\.ts|modified|updated|wrote"
  - text: "The implementation looks correct (returns a+b)"
    type: quality
