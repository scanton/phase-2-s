name: Verify Action Build

on:
  pull_request:
    paths:
      - 'src/action/**'
      - 'action.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  verify-action-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build action bundle
        run: npm run build:action

      - name: Check dist/action/index.js is committed and up-to-date
        run: |
          git diff --exit-code dist/action/index.js || \
            (echo "dist/action/index.js is out of date. Run 'npm run build:action' locally and commit the result." && exit 1)
