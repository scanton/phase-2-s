name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify bin entry exists
        run: test -f dist/bin/phase2s.js

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build action bundle
        run: npm run build:action

      - name: Update floating v1 tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f v1
          git push origin v1 --force

  alpine-smoke:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: node:22-alpine
    defaults:
      run:
        shell: sh
    steps:
      - name: Install phase2s from npm
        run: npm install -g @scanton/phase2s@${GITHUB_REF_NAME#v}

      - name: Verify version (exercises full CLI startup including all module loading)
        run: phase2s --version

  conduct-audit:
    name: Conduct Audit (CI gate)
    runs-on: ubuntu-latest
    needs: alpine-smoke
    steps:
      - name: Install phase2s from npm
        run: npm install -g @scanton/phase2s@${GITHUB_REF_NAME#v}

      - name: Run conduct-audit ciGate (no-op if secret absent)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            phase2s conduct-audit --ci --ci-only
          else
            echo "OPENAI_API_KEY not configured — conduct-audit CI gate skipped"
            echo "To enable: add OPENAI_API_KEY to repo Settings → Secrets → Actions"
          fi
